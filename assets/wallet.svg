<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet Icon SVG - Convert to PNG -->
  <defs>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="url(#walletGrad)" opacity="0.2" stroke="#00d2ff" stroke-width="2"/>
  
  <!-- Wallet Body -->
  <rect x="25" y="35" width="50" height="35" rx="5" fill="none" stroke="#00d2ff" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Wallet Fold -->
  <line x1="50" y1="35" x2="50" y2="70" stroke="#00d2ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Wallet Button -->
  <circle cx="60" cy="52" r="4" fill="#00d2ff" filter="url(#glow)"/>
  
  <!-- TON Symbol -->
  <text x="50" y="32" text-anchor="middle" fill="#00d2ff" font-size="12" font-weight="bold" filter="url(#glow)">TON</text>
</svg>
