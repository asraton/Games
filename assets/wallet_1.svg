<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet Icon 1 - Classic Gold -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" opacity="0.15" stroke="#ffd700" stroke-width="2"/>
  
  <!-- Classic Wallet -->
  <rect x="28" y="38" width="44" height="30" rx="4" fill="none" stroke="#ffd700" stroke-width="2.5" filter="url(#glow1)"/>
  <path d="M28 45 L72 45" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  <circle cx="62" cy="53" r="3" fill="#ffd700" filter="url(#glow1)"/>
</svg>
