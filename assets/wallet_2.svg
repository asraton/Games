<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet Icon 2 - Modern -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#grad2)" opacity="0.15" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Modern Wallet Shape -->
  <path d="M30 40 L70 40 L70 65 L30 65 Z" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow2)"/>
  <path d="M30 40 L50 52 L30 65" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <rect x="55" y="48" width="10" height="8" rx="2" fill="#00ff88" filter="url(#glow2)"/>
</svg>
