<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet Icon 3 - Premium -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3333ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#grad3)" opacity="0.2" stroke="#ff00cc" stroke-width="2"/>
  
  <!-- Premium Wallet -->
  <rect x="25" y="35" width="50" height="38" rx="6" fill="none" stroke="#ff00cc" stroke-width="3" filter="url(#glow3)"/>
  <line x1="50" y1="35" x2="50" y2="73" stroke="#ff00cc" stroke-width="2" opacity="0.4"/>
  <circle cx="65" cy="54" r="5" fill="none" stroke="#ff00cc" stroke-width="2" filter="url(#glow3)"/>
  <text x="38" y="58" fill="#ff00cc" font-size="10" font-weight="bold">VIP</text>
</svg>
