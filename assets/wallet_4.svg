<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet Icon 4 - Minimal -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cccccc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#grad4)" opacity="0.1" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Minimal Wallet -->
  <rect x="32" y="40" width="36" height="26" rx="3" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#glow4)"/>
  <path d="M32 40 L50 53 L32 66" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="58" cy="53" r="3" fill="#ffffff" filter="url(#glow4)"/>
</svg>
