<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON Coin Rush</title>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #00122e;
            height: 100vh;
            overflow: hidden;
            position: relative;
            margin: 0;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #score-display {
            position: fixed;
            top: clamp(10px, 3vh, 20px);
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: clamp(12px, 2vw, 14px);
            background: rgba(0, 0, 0, 0.7);
            padding: clamp(8px, 1.5vh, 12px) clamp(15px, 3vw, 25px);
            border-radius: clamp(15px, 2vw, 20px);
            z-index: 90;
            border: 2px solid rgba(255, 215, 0, 0.5);
            display: flex;
            gap: clamp(10px, 2vw, 15px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(8px, 1.5vh, 10px) clamp(15px, 2vw, 25px);
            background: rgba(0, 0, 0, 0.4);
            border-radius: clamp(12px, 1.5vw, 15px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            min-width: clamp(80px, 10vw, 100px);
        }

        .score-label {
            font-size: clamp(10px, 1.2vw, 12px);
            color: #aaa;
            margin-bottom: 0.5vh;
            text-transform: uppercase;
        }

        .score-value {
            font-size: clamp(14px, 2vw, 18px);
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
            font-family: 'Courier New', monospace;
        }

        #ton-value {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .game-controls {
            position: fixed;
            bottom: clamp(20px, 3vh, 30px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        #stop-btn {
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            border: none;
            color: white;
            padding: clamp(12px, 2vh, 15px) clamp(35px, 4vw, 50px);
            border-radius: clamp(25px, 3vw, 30px);
            cursor: pointer;
            font-size: clamp(16px, 2vw, 18px);
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(46, 213, 115, 0.4), 0 0 30px rgba(46, 213, 115, 0.2);
            transition: all 0.3s ease;
            min-width: clamp(150px, 20vw, 180px);
        }

        #stop-btn:hover {
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.6), 0 0 40px rgba(46, 213, 115, 0.3);
            transform: translateY(-2px);
        }

        #stop-btn.stop-mode {
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.4), 0 0 30px rgba(255, 71, 87, 0.2);
        }

        #stop-btn.stop-mode:hover {
            box-shadow: 0 6px 25px rgba(255, 71, 87, 0.6), 0 0 40px rgba(255, 71, 87, 0.3);
        }

        .game-coin {
            position: absolute;
            width: clamp(120px, 20vw, 220px);
            height: clamp(120px, 20vw, 220px);
            cursor: pointer;
            z-index: 50;
            display: none;
            transition: transform 0.1s;
        }

        .game-coin:active {
            transform: scale(0.9);
        }

        .game-coin img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        @keyframes popUp {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes shrinkOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) rotate(180deg); opacity: 0; }
        }

        .coin-pop {
            animation: popUp 0.4s ease-out forwards;
        }

        .coin-shrink {
            animation: shrinkOut 0.3s ease-in forwards;
        }

        .coin-clicked {
            background: radial-gradient(circle, rgba(255, 50, 50, 0.8) 0%, rgba(255, 50, 50, 0.4) 40%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.8), 0 0 60px rgba(255, 50, 50, 0.5);
            animation: redPulse 0.5s ease-out;
        }

        @keyframes redPulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 50, 50, 0.8); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(255, 50, 50, 1); }
            100% { transform: scale(0.9); box-shadow: 0 0 30px rgba(255, 50, 50, 0.8); }
        }

        .float-text {
            position: absolute;
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 60;
            text-shadow: 0 0 15px currentColor;
            color: #ffd700;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(clamp(-20px, -4vh, -30px)) scale(1.3); }
            100% { transform: translateY(clamp(-35px, -6vh, -50px)) scale(0.8); opacity: 0; }
        }

        #coin img.pulse-yellow { animation: pulseYellow 0.6s ease-in-out infinite; }
        #coin img.pulse-red { animation: pulseRed 0.6s ease-in-out infinite; }
        #coin img.pulse-green { animation: pulseGreen 0.6s ease-in-out infinite; }
        #coin img.pulse-blue { animation: pulseBlue 0.6s ease-in-out infinite; }
        #coin img.pulse-cyan { animation: pulseCyan 0.6s ease-in-out infinite; }
        #coin img.pulse-purple { animation: pulsePurple 0.6s ease-in-out infinite; }
        #coin img.pulse-orange { animation: pulseOrange 0.6s ease-in-out infinite; }

        #coin2 img.pulse-yellow { animation: pulseYellow 0.6s ease-in-out infinite; }
        #coin2 img.pulse-red { animation: pulseRed 0.6s ease-in-out infinite; }
        #coin2 img.pulse-green { animation: pulseGreen 0.6s ease-in-out infinite; }
        #coin2 img.pulse-blue { animation: pulseBlue 0.6s ease-in-out infinite; }
        #coin2 img.pulse-cyan { animation: pulseCyan 0.6s ease-in-out infinite; }
        #coin2 img.pulse-purple { animation: pulsePurple 0.6s ease-in-out infinite; }
        #coin2 img.pulse-orange { animation: pulseOrange 0.6s ease-in-out infinite; }

        #coin3 img.pulse-yellow { animation: pulseYellow 0.6s ease-in-out infinite; }
        #coin3 img.pulse-red { animation: pulseRed 0.6s ease-in-out infinite; }
        #coin3 img.pulse-green { animation: pulseGreen 0.6s ease-in-out infinite; }
        #coin3 img.pulse-blue { animation: pulseBlue 0.6s ease-in-out infinite; }
        #coin3 img.pulse-cyan { animation: pulseCyan 0.6s ease-in-out infinite; }
        #coin3 img.pulse-purple { animation: pulsePurple 0.6s ease-in-out infinite; }
        #coin3 img.pulse-orange { animation: pulseOrange 0.6s ease-in-out infinite; }

        @keyframes pulseYellow { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 215, 0, 1)); } }
        @keyframes pulseRed { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(255, 50, 50, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 50, 50, 1)); } }
        @keyframes pulseGreen { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(0, 255, 100, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(0, 255, 100, 1)); } }
        @keyframes pulseBlue { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(0, 150, 255, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(0, 150, 255, 1)); } }
        @keyframes pulseCyan { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(0, 255, 255, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(0, 255, 255, 1)); } }
        @keyframes pulsePurple { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(200, 0, 255, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(200, 0, 255, 1)); } }
        @keyframes pulseOrange { 0%, 100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(255, 150, 0, 0.9)); } 50% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 150, 0, 1)); } }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-display">
            <div class="score-box">
                <div class="score-label">TON</div>
                <div class="score-value" id="ton-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">nTON</div>
                <div class="score-value" id="nton-display">000000000</div>
            </div>
        </div>

        <div class="game-controls">
            <button id="stop-btn">▶️ START</button>
        </div>
    </div>

    <div id="coin" class="game-coin">
        <img src="/assets/tanga.png" alt="TON Tanga">
    </div>
    <div id="coin2" class="game-coin">
        <img src="/assets/tanga.png" alt="TON Tanga 2">
    </div>
    <div id="coin3" class="game-coin">
        <img src="/assets/tanga.png" alt="TON Tanga 3">
    </div>

    <script>
        // Game state
        let nanoScore = 0;
        let tonCount = 0;
        const NANO_PER_TON = 1000000000;
        let gameActive = false;
        let isPaused = false;
        let totalClicks = 0;
        let currentSpeedLevel = 1;

        // Elements
        const tonDisplayElement = document.getElementById('ton-value');
        const ntonDisplayElement = document.getElementById('nton-display');
        const stopBtn = document.getElementById('stop-btn');

        const coins = [
            document.getElementById('coin'),
            document.getElementById('coin2'),
            document.getElementById('coin3')
        ];
        const coinTimeouts = [null, null, null];
        const coinVisible = [false, false, false];

        const pulseColors = ['pulse-yellow', 'pulse-red', 'pulse-green', 'pulse-blue', 'pulse-cyan', 'pulse-purple', 'pulse-orange'];

        function updateDisplay() {
            tonDisplayElement.textContent = tonCount;
            ntonDisplayElement.textContent = nanoScore.toString().padStart(9, '0');
        }

        function getReward() {
            return Math.floor(Math.random() * 100) + 1;
        }

        function calculateSpeed() {
            currentSpeedLevel = Math.max(1, tonCount + 1);
            return Math.max(300, 2500 - (currentSpeedLevel * 400));
        }

        function getRandomPosition(coinSize, excludeIndex) {
            const screen = { width: window.innerWidth, height: window.innerHeight };
            const margin = 40;
            const minDistance = coinSize * 0.6;
            const existingPositions = [];

            coins.forEach((coinEl, idx) => {
                if (idx !== excludeIndex && coinVisible[idx] && coinEl.style.display === 'block') {
                    existingPositions.push({
                        x: parseFloat(coinEl.style.left) || 0,
                        y: parseFloat(coinEl.style.top) || 0
                    });
                }
            });

            let attempts = 0;
            let pos;
            let isValid = false;

            while (!isValid && attempts < 100) {
                pos = {
                    x: margin + Math.random() * (screen.width - margin * 2 - coinSize),
                    y: margin + Math.random() * (screen.height - margin * 2 - coinSize)
                };

                isValid = true;
                for (const existing of existingPositions) {
                    const distance = Math.sqrt(Math.pow(pos.x - existing.x, 2) + Math.pow(pos.y - existing.y, 2));
                    if (distance < minDistance) {
                        isValid = false;
                        break;
                    }
                }
                attempts++;
            }
            return pos;
        }

        function showCoinAt(index) {
            if (!gameActive || isPaused) return;
            const coinEl = coins[index];
            if (!coinEl) return;

            const coinImg = coinEl.querySelector('img');
            pulseColors.forEach(c => coinImg.classList.remove(c));
            coinImg.classList.add(pulseColors[Math.floor(Math.random() * pulseColors.length)]);

            const coinSize = 180;
            const pos = getRandomPosition(coinSize, index);

            coinEl.style.left = pos.x + 'px';
            coinEl.style.top = pos.y + 'px';
            coinEl.style.display = 'block';
            coinEl.classList.add('coin-pop');
            coinVisible[index] = true;

            setTimeout(() => coinEl.classList.remove('coin-pop'), 400);

            const visibleTime = calculateSpeed();
            clearTimeout(coinTimeouts[index]);
            coinTimeouts[index] = setTimeout(() => {
                if (gameActive && !isPaused) hideCoinAt(index);
            }, visibleTime);
        }

        function hideCoinAt(index) {
            clearTimeout(coinTimeouts[index]);
            const coinEl = coins[index];
            if (!coinEl) return;

            coinEl.classList.add('coin-shrink');
            coinTimeouts[index] = setTimeout(() => {
                coinEl.style.display = 'none';
                coinEl.classList.remove('coin-shrink');
                coinVisible[index] = false;
                if (gameActive && !isPaused) {
                    setTimeout(() => showCoinAt(index), Math.random() * 500);
                }
            }, 300);
        }

        function showCoin() {
            if (!gameActive || isPaused) return;
            showCoinAt(0);
            if (Math.random() < 0.4) setTimeout(() => showCoinAt(1), 200);
            if (Math.random() < 0.15) setTimeout(() => showCoinAt(2), 400);
        }

        function showFloatText(x, y, text) {
            const floatEl = document.createElement('div');
            floatEl.className = 'float-text';
            floatEl.textContent = text;
            floatEl.style.left = (x - 40) + 'px';
            floatEl.style.top = y + 'px';
            document.body.appendChild(floatEl);
            setTimeout(() => floatEl.remove(), 1000);
        }

        function catchCoin(e, coinIndex) {
            e.preventDefault();
            if (!gameActive || isPaused) return;
            if (coinIndex !== undefined && !coinVisible[coinIndex]) return;

            clearTimeout(coinTimeouts[coinIndex || 0]);
            totalClicks++;

            const reward = getReward();
            nanoScore += reward;

            if (nanoScore >= NANO_PER_TON) {
                tonCount++;
                nanoScore = nanoScore - NANO_PER_TON;
            }

            if (coinIndex !== undefined && coins[coinIndex]) {
                coins[coinIndex].classList.add('coin-clicked');
                setTimeout(() => coins[coinIndex].classList.remove('coin-clicked'), 500);
            }

            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            if (x && y) showFloatText(x, y - 50, '+' + reward + ' nTON');

            updateDisplay();
            if (coinIndex !== undefined) hideCoinAt(coinIndex);
        }

        function startNewGame() {
            nanoScore = 0;
            tonCount = 0;
            totalClicks = 0;
            currentSpeedLevel = 1;
            gameActive = true;
            isPaused = false;

            updateDisplay();

            stopBtn.textContent = '⏹️ STOP';
            stopBtn.classList.add('stop-mode');

            showCoin();
        }

        function stopGame() {
            isPaused = true;
            gameActive = false;
            coinTimeouts.forEach((timeout, index) => {
                clearTimeout(timeout);
                if (coins[index]) coins[index].style.display = 'none';
            });

            stopBtn.textContent = '▶️ START';
            stopBtn.classList.remove('stop-mode');
        }

        function toggleGame() {
            if (gameActive) {
                stopGame();
            } else {
                startNewGame();
            }
        }

        // Event listeners
        stopBtn.addEventListener('click', toggleGame);

        coins.forEach((coinEl, index) => {
            if (coinEl) {
                coinEl.addEventListener('click', (e) => catchCoin(e, index));
                coinEl.addEventListener('touchstart', (e) => catchCoin(e, index), { passive: false });
            }
        });

        // Telegram Web App
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
